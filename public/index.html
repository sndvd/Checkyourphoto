<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkyourphoto - Forensic Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Silkscreen&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #101314; --accent-color: #00FF8C; }
        body { background-color: var(--bg-color); color: #fff; font-family: 'Orbitron', sans-serif; }
        
        /* THE SCAN AREA */
        .scan-container { border: 2px solid var(--accent-color); padding: 2rem; background: #000; margin-top: 2rem; }
        .dropzone { border: 2px dashed var(--accent-color); padding: 50px; cursor: pointer; text-align: center; }
        .drop-instruction { color: var(--accent-color); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }

        /* THE RESULTS - HIGH CONTRAST BLACK ON WHITE */
        #results { display: none; margin-top: 30px; background: #fff; padding: 30px; border: 5px solid var(--accent-color); }
        
        #fileNameDisplay {
            color: #000;
            font-family: 'Inter', sans-serif;
            font-weight: 900; /* AVENUE BLACK STYLE */
            font-size: 2rem;
            border-bottom: 5px solid #000;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        .result-box { margin-bottom: 20px; }
        .result-label { color: #666; font-family: 'Silkscreen'; font-size: 0.8rem; margin-bottom: 5px; display: block; }
        
        .result-value {
            color: #000;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 1.8rem; /* EXTREMELY BRIGHT AND CLEAR */
            line-height: 1.2;
        }

        #aiBox {
            background: #000;
            color: var(--accent-color);
            padding: 20px;
            margin-top: 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
        }

        #map { height: 300px; width: 100%; border: 3px solid #000; margin-top: 15px; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="text-center mt-5">
        <h1 style="font-size: 3.5rem; font-weight: 900;" class="neon-text">CHECK YOUR PHOTO</h1>
        <p class="text-success fw-bold">FORENSIC DATA EXTRACTION</p>
    </div>

    <div class="scan-container">
        <div class="dropzone" id="uploadArea">
            <div class="drop-instruction">DRAG IMAGE HERE TO REVEAL SECRETS</div>
            <input type="file" id="fileInput" class="d-none">
        </div>
        
        <div id="loading" class="text-center mt-3" style="display:none;">
            <h2 class="text-success">DECRYPTING...</h2>
        </div>

        <div id="results">
            <div id="fileNameDisplay">FILENAME.JPG</div>
            
            <div class="result-box">
                <span class="result-label">DATE_OF_ORIGIN</span>
                <div class="result-value" id="val-date">SEARCHING...</div>
            </div>

            <div class="result-box">
                <span class="result-label">HARDWARE_SIGNATURE</span>
                <div class="result-value" id="val-device">SEARCHING...</div>
            </div>

            <div id="map-container" style="display:none;">
                <span class="result-label">COORDINATE_FIX</span>
                <div id="map"></div>
            </div>

            <div id="aiBox">
                <span class="result-label" style="color: #fff;">FORENSIC_SUMMARY</span>
                <div id="aiExplanation">INITIALIZING ANALYSIS...</div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const results = document.getElementById('results');
    let map = null, marker = null;

    uploadArea.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if (e.target.files.length) handleFileUpload(e.target.files[0]); };

    async function handleFileUpload(file) {
        document.getElementById('loading').style.display = 'block';
        results.style.display = 'none';
        const formData = new FormData();
        formData.append('file', file);
        try {
            const response = await fetch('/api/extract', { method: 'POST', body: formData });
            const data = await response.json();
            displayResults(data, file.name);
        } catch (error) { alert('ERROR'); } finally { document.getElementById('loading').style.display = 'none'; }
    }

    function displayResults(data, fileName) {
        results.style.display = 'block';
        document.getElementById('fileNameDisplay').textContent = fileName.toUpperCase();
        
        // SMART SEARCH FOR DATE
        const date = data.DateTimeOriginal || data.CreateDate || data.ModifyDate || data.FileModifyDate || "NO DATE DATA FOUND";
        document.getElementById('val-date').textContent = date;

        // SMART SEARCH FOR DEVICE
        const device = (data.Make || data.Model) ? `${data.Make || ''} ${data.Model || ''}` : "UNKNOWN DEVICE";
        document.getElementById('val-device').textContent = device;

        document.getElementById('aiExplanation').textContent = data.ai_summary;

        if (data.gps) {
            document.getElementById('map-container').style.display = 'block';
            if (!map) {
                map = L.map('map').setView([data.gps.lat, data.gps.lon], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            } else { map.setView([data.gps.lat, data.gps.lon], 13); }
            if (marker) map.removeLayer(marker);
            marker = L.marker([data.gps.lat, data.gps.lon]).addTo(map);
        } else {
            document.getElementById('map-container').style.display = 'none';
        }
    }
</script>

</body>
</html>
