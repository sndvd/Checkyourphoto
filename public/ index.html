<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkyourphoto - Futuristic Forensic Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Silkscreen&family=Big+Shoulders+Display:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #101314;
            --card-bg: #141C1A;
            --accent-color: #00FF8C;
            --text-color: #e0e0e0;
            --neon-text-glow: 0 0 8px rgba(0, 255, 140, 0.8);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            background-image: linear-gradient(rgba(0, 255, 140, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 140, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .brand-font { font-family: 'Big Shoulders Display', sans-serif; font-weight: 900; text-transform: uppercase; }
        .pixel-font { font-family: 'Silkscreen', cursive; }
        .neon-text { color: var(--accent-color); text-shadow: var(--neon-text-glow); }

        .navbar { background-color: rgba(16, 19, 20, 0.9); border-bottom: 1px solid rgba(0, 255, 140, 0.2); padding: 1rem 0; }
        .brand-icon { width: 30px; height: 30px; margin: 0 10px; filter: drop-shadow(var(--neon-text-glow)); }

        .header-title { font-size: 4rem; text-align: center; margin-top: 2rem; }
        .header-subtitle { font-size: 1.2rem; letter-spacing: 8px; text-align: center; color: var(--accent-color); margin-bottom: 1rem; opacity: 0.8; }

        /* The new instruction line style */
        .mission-brief {
            font-family: 'Silkscreen', cursive;
            color: #00FF8C;
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .scan-container { border: 1px solid rgba(0, 255, 140, 0.1); background: linear-gradient(180deg, rgba(0, 255, 140, 0.02) 0%, rgba(16, 19, 20, 1) 100%); padding: 2rem; position: relative; }
        .focus-marker { position: absolute; width: 40px; height: 40px; z-index: 10; }

        .dropzone {
            border: 2px dotted var(--accent-color);
            background-color: var(--card-bg);
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .drop-instruction {
            color: var(--accent-color);
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 140, 0.5);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .scan-line { position: absolute; top: -100%; left: 0; width: 100%; height: 4px; background: var(--accent-color); box-shadow: 0 0 15px var(--accent-color); animation: scan 3s linear infinite; display: none; }
        .dropzone:hover .scan-line { display: block; }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }

        .upload-icon { width: 120px; margin-bottom: 20px; filter: drop-shadow(var(--neon-text-glow)); }
        .card { background-color: var(--card-bg); border: 1px solid rgba(0, 255, 140, 0.2); color: var(--text-color); }
        #map { height: 400px; width: 100%; filter: grayscale(1) invert(0.9) hue-rotate(100deg); border: 1px solid var(--accent-color); }
        #results { display: none; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container justify-content-center">
        <img src="assets/telescope_icon.svg" class="brand-icon">
        <span class="navbar-brand neon-text pixel-font">META_READER_v1.0</span>
        <img src="assets/microscope_icon.svg" class="brand-icon">
    </div>
</nav>

<div class="container mt-4">
    <h1 class="header-title neon-text brand-font">CHECK YOUR PHOTO</h1>
    <p class="header-subtitle pixel-font">FORENSIC ANALYSIS</p>
    
    <!-- YOUR NEW LINE OF COPY -->
    <p class="mission-brief">Scan your photo or image and find out information like date, location, format, etc.</p>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="scan-container mb-5">
                <img src="assets/focus_markers.svg" class="focus-marker top-0 start-0">
                <img src="assets/focus_markers.svg" class="focus-marker top-0 end-0" style="transform: rotate(90deg);">
                <img src="assets/focus_markers.svg" class="focus-marker bottom-0 start-0" style="transform: rotate(270deg);">
                <img src="assets/focus_markers.svg" class="focus-marker bottom-0 end-0" style="transform: rotate(180deg);">
                
                <div class="dropzone" id="uploadArea">
                    <div class="scan-line"></div>
                    <img src="assets/forensic_magnifier.svg" class="upload-icon">
                    <h4 class="pixel-font neon-text">INITIATE SCAN</h4>
                    <p class="mt-3 drop-instruction">DRAG PHOTO HERE / CLICK TO BROWSE</p>
                    <input type="file" id="fileInput" class="d-none" accept="image/*">
                </div>
                
                <div id="loading" class="text-center mt-4" style="display: none;">
                    <div class="spinner-border text-success"></div>
                    <p class="mt-2 neon-text pixel-font">ANALYZING BYTES...</p>
                </div>

                <div id="results" class="mt-5">
                    <h5 id="fileNameDisplay" class="neon-text pixel-font border-bottom pb-2 mb-4">FILE.DAT</h5>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="card p-3">
                                <label class="small text-muted mb-1 text-uppercase">Capture Time</label>
                                <div class="form-control mb-2" id="val-capture-time">N/A</div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="card p-3">
                                <label class="small text-muted mb-1 text-uppercase">Hardware</label>
                                <div class="form-control mb-2" id="val-device">N/A</div>
                            </div>
                        </div>
                    </div>

                    <div class="card mt-3" id="gps-container">
                        <div id="map"></div>
                    </div>

                    <div class="card mt-4 p-3" style="border-left: 4px solid var(--accent-color);">
                        <h6 class="pixel-font neon-text">AI_FORENSIC_SUMMARY</h6>
                        <div id="aiExplanation" class="small text-muted">Awaiting scan...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    
    let map = null, marker = null;

    uploadArea.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if (e.target.files.length) handleFileUpload(e.target.files[0]); };

    async function handleFileUpload(file) {
        loading.style.display = 'block';
        results.style.display = 'none';
        const formData = new FormData();
        formData.append('file', file);
        try {
            const response = await fetch('/api/extract', { method: 'POST', body: formData });
            const data = await response.json();
            displayResults(data, file.name);
        } catch (error) { alert('Scan failed.'); } finally { loading.style.display = 'none'; }
    }

    function displayResults(data, fileName) {
        document.getElementById('fileNameDisplay').textContent = fileName.toUpperCase();
        results.style.display = 'block';
        document.getElementById('val-capture-time').textContent = data.DateTimeOriginal || 'N/A';
        document.getElementById('val-device').textContent = (data.Make || data.Model) ? `${data.Make || ''} ${data.Model || ''}` : 'N/A';
        document.getElementById('aiExplanation').textContent = data.ai_summary || 'No AI summary available.';

        if (data.gps) {
            document.getElementById('gps-container').style.display = 'block';
            if (!map) {
                map = L.map('map').setView([data.gps.lat, data.gps.lon], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            } else { map.setView([data.gps.lat, data.gps.lon], 13); }
            if (marker) map.removeLayer(marker);
            marker = L.marker([data.gps.lat, data.gps.lon]).addTo(map);
            setTimeout(() => map.invalidateSize(), 500);
        } else {
            document.getElementById('gps-container').style.display = 'none';
        }
    }
</script>

</body>
</html>
